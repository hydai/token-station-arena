id: add-api-endpoint
title: Add a small Axum API endpoint
description: Add a top-products endpoint to the Axum API crate and satisfy the integration test.
fixturePath: fixture
promptFile: prompt.md
setup:
  - cargo fetch
checks:
  - name: unit-tests
    command: cargo test
  - name: typecheck
    command: cargo check
  - name: clippy
    command: cargo clippy --all-targets -- -D warnings
success:
  requiredChecks:
    - unit-tests
    - typecheck
    - clippy
judge:
  unrelatedChangePolicy: fail
  allowedChangePaths:
    - crates/**
    - tests/**
    - Cargo.toml
    - Cargo.lock
    - README.md
